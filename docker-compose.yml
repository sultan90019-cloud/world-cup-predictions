services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: worldcup
      POSTGRES_USER: worldcup_user
      POSTGRES_PASSWORD: worldcup_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worldcup_user -d worldcup"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - "3002:3000"
    environment:
      DATABASE_URL: postgresql://worldcup_user:worldcup_password@db:5432/worldcup
      NODE_ENV: development
      SESSION_SECRET: worldcup-secret-key-change-this-in-production
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/public/uploads

volumes:
  pgdata:
  uploads_data:
